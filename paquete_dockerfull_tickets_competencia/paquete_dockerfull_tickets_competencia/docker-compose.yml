services:
  db:
    image: postgres:16
    container_name: tickets_competencia_db_full
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tickets_competencia_backend_full
    environment:
      APP_NAME: ${APP_NAME}
      APP_ENV: ${APP_ENV}
      APP_PORT: ${APP_PORT}
      DEMO_AUTH_ENABLED: ${DEMO_AUTH_ENABLED}
      DATABASE_URL: ${DATABASE_URL}
      STORAGE_ROOT: ${STORAGE_ROOT}
      INBOUND_PATH: ${INBOUND_PATH}
      ARCHIVE_PATH: ${ARCHIVE_PATH}
      ERROR_PATH: ${ERROR_PATH}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES}
      ALLOWED_EXTENSIONS: ${ALLOWED_EXTENSIONS}
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_storage:/app/storage/files
      - backend_archive:/app/data/inbound/ARCHIVE
      - backend_error:/app/data/inbound/ERROR
    healthcheck:
      test: ["CMD-SHELL", "python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')""]
      interval: 10s
      timeout: 5s
      retries: 15

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: tickets_competencia_frontend_full
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

volumes:
  pgdata:
  backend_storage:
  backend_archive:
  backend_error:
